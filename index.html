<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkers</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔴</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Checkers</h1>
        </header>

        <div id="mode-bar">
            <div id="mode-toggle">
                <button class="mode-btn active" id="btn-2p">2 Players</button>
                <button class="mode-btn" id="btn-ai">vs AI</button>
                <button class="mode-btn" id="btn-learn">Learn</button>
            </div>
            <div id="difficulty-wrap" class="hidden">
                <span class="diff-label">Difficulty</span>
                <input type="range" id="difficulty-slider" min="1" max="10" value="5" step="1">
                <span id="diff-val">5</span>
            </div>
        </div>

        <div id="game-screen">
            <div id="status-bar">
                <div id="player-red" class="player-indicator">
                    <div class="piece-preview red"></div>
                    <span id="red-name">Red</span>
                    <span id="red-count" class="piece-count">12</span>
                </div>
                <div id="turn-label">Red's Turn</div>
                <div id="player-black" class="player-indicator">
                    <div class="piece-preview black"></div>
                    <span id="black-name">Black</span>
                    <span id="black-count" class="piece-count">12</span>
                </div>
            </div>

            <div id="board-wrap">
                <div id="board"></div>
                <div id="pieces-layer"></div>
            </div>

            <div id="bottom-bar">
                <button id="new-game-btn">New Game</button>
                <div id="message-box"></div>
            </div>
        </div>

        <div id="learn-screen" class="hidden">
            <div id="roadmap-view">
                <div id="roadmap-progress">
                    <div id="roadmap-progress-bar"><div id="roadmap-progress-fill"></div></div>
                    <span id="roadmap-progress-label">0 / 7 complete</span>
                </div>
                <div id="roadmap-path"></div>
            </div>

            <div id="lesson-view" class="hidden">
                <button id="lesson-back-btn">&larr; Path</button>
                <h2 id="lesson-title"></h2>
                <p id="lesson-instructions"></p>

                <div id="lesson-board-wrap">
                    <div id="lesson-board"></div>
                    <div id="lesson-pieces-layer"></div>
                    <div id="lesson-success" class="hidden">
                        <div class="lesson-success-badge">
                            <div class="lesson-success-check">&#10003;</div>
                            <div>Lesson Complete!</div>
                        </div>
                        <div id="lesson-success-actions">
                            <button id="lesson-replay-btn">Replay</button>
                            <button id="lesson-continue-btn">Continue</button>
                        </div>
                    </div>
                </div>

                <div id="lesson-message"></div>
            </div>
        </div>

        <div id="win-overlay" class="hidden">
            <div class="win-modal">
                <div class="trophy">🏆</div>
                <h2 id="win-title">Red Wins!</h2>
                <p id="win-sub"></p>
                <button id="play-again-btn">Play Again</button>
            </div>
        </div>
    </div>
    <script src="vendor/gsap.min.js"></script>
    <script src="game.js"></script>
    <script src="learn.js"></script>
</body>
</html>
